services:
  mcp-server:
    container_name: mcp-puppeteer
    build:
      context: .
      dockerfile: Dockerfile
    image: puppeteer-mcp:060418
    working_dir: /app
    entrypoint: ["python"]
    command: ["start-mcp-server.py", "streamable-http"]
    ports:
      - "8001:8001"
    volumes:
      - ./images:/app/images
      - ./html:/app/html
      - ./test:/app/test
    networks:
      wp-net:
        aliases:
          - mcp-puppeteer
          - mcp-server
    restart: unless-stopped
    init: true
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  wp-net:
    external: true
